services:
  backend:
    build:
      context: ./backend
    container_name: legal-assistant-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: legal-assistant-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped